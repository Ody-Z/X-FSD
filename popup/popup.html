<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Growth Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>X Growth Assistant</h1>
      <nav class="tabs">
        <button class="tab active" data-tab="settings">Settings</button>
        <button class="tab" data-tab="onboarding">Onboarding</button>
      </nav>
    </header>

    <!-- Settings Tab -->
    <section id="settings" class="tab-content active">
      <div class="field">
        <label for="username">X Username</label>
        <input type="text" id="username" placeholder="@yourhandle">
      </div>
      <div class="field">
        <label for="activeModel">Active Model</label>
        <select id="activeModel">
          <option value="claude-haiku">Claude Haiku 3.5</option>
          <option value="claude-code-haiku-local">Claude Code Haiku Local (macOS)</option>
          <option value="kimi-k2.5">Kimi K2.5</option>
          <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash-Lite (Preview)</option>
          <option value="gemini-cli-local">Gemini CLI Local (macOS)</option>
        </select>
        <p id="modelHint" class="hint">Select a model and save your settings.</p>
      </div>
      <div class="field">
        <label for="autoDraftsEnabled">Auto Drafts</label>
        <label class="toggle-row" for="autoDraftsEnabled">
          <input type="checkbox" id="autoDraftsEnabled">
          <span>Enable feed-native auto draft queue</span>
        </label>
        <p class="hint">Auto drafts choose the reply strategy for each post and use your saved voice profile.</p>
      </div>
      <div class="field model-field" id="anthropicApiKeyField">
        <label for="anthropicApiKey">Anthropic API Key</label>
        <input type="password" id="anthropicApiKey" placeholder="sk-ant-...">
      </div>
      <div class="field model-field" id="moonshotApiKeyField">
        <label for="moonshotApiKey">Moonshot API Key</label>
        <input type="password" id="moonshotApiKey" placeholder="sk-...">
      </div>
      <div class="field model-field" id="geminiApiKeyField">
        <label for="geminiApiKey">Gemini API Key</label>
        <input type="password" id="geminiApiKey" placeholder="AIza...">
      </div>
      <div class="field model-field" id="moonshotEndpointField">
        <label for="moonshotEndpoint">Moonshot Region</label>
        <select id="moonshotEndpoint">
          <option value="https://api.moonshot.cn/v1">China (api.moonshot.cn)</option>
          <option value="https://api.moonshot.ai/v1">International (api.moonshot.ai)</option>
        </select>
      </div>
      <button id="saveSettings" class="btn btn-primary">Save Settings</button>
      <div id="settingsStatus" class="status"></div>
    </section>

    <!-- Onboarding Tab -->
    <section id="onboarding" class="tab-content">
      <div class="field">
        <label for="voiceDisplayName">Name</label>
        <input type="text" id="voiceDisplayName" placeholder="Your name or handle">
      </div>

      <section class="choice-group" aria-labelledby="identityTitle">
        <div class="choice-header">
          <h2 id="identityTitle">Identity</h2>
          <span id="identityCount" class="choice-count">0 selected</span>
        </div>
        <div id="identityChoices" class="choice-grid"></div>
        <input type="text" id="identityOther" class="other-input" placeholder="Other identity">
      </section>

      <section class="choice-group" aria-labelledby="interestsTitle">
        <div class="choice-header">
          <h2 id="interestsTitle">Interests</h2>
          <span id="interestsCount" class="choice-count">0 selected</span>
        </div>
        <div id="interestsChoices" class="choice-grid"></div>
        <input type="text" id="interestsOther" class="other-input" placeholder="Other interest">
      </section>

      <section class="choice-group" aria-labelledby="voiceTitle">
        <div class="choice-header">
          <h2 id="voiceTitle">Voice</h2>
          <span id="voiceCount" class="choice-count">0 selected</span>
        </div>
        <div id="voiceChoices" class="choice-grid"></div>
        <input type="text" id="voiceOther" class="other-input" placeholder="Other voice rule">
      </section>

      <section class="choice-group" aria-labelledby="samplesTitle">
        <div class="choice-header">
          <h2 id="samplesTitle">Sample Replies</h2>
          <span id="samplesCount" class="choice-count">0 selected</span>
        </div>
        <div id="samplesChoices" class="sample-list"></div>
        <textarea id="samplesOther" class="other-input sample-other" rows="3" placeholder="Other sample replies"></textarea>
      </section>

      <details class="advanced-prompt">
        <summary>Advanced prompt</summary>
        <div class="field prompt-field">
          <label for="voiceSystemPrompt">System Prompt</label>
          <textarea id="voiceSystemPrompt" rows="9" spellcheck="false"></textarea>
        </div>
      </details>

      <div class="voice-actions">
        <button id="resetVoicePrompt" class="btn btn-secondary">Reset</button>
      </div>

      <button id="saveVoiceProfile" class="btn btn-primary">Save Voice Profile</button>
      <div id="onboardingStatus" class="status"></div>
    </section>
  </div>
  <script src="../utils/storage.js"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
